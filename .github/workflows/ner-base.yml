name: NER Base Image

on:
  # Manual trigger only -- run when ONNX Runtime version, NER model, or
  # export script changes. Not triggered by merges to main.
  workflow_dispatch:
    inputs:
      version:
        description: 'Base image version tag (e.g. v1, v2)'
        required: true
        default: 'v1'
      ner_model:
        description: 'HuggingFace NER model name'
        required: true
        default: 'dslim/bert-base-NER'

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/${{ github.repository }}-ner-base

jobs:
  build-base:
    name: Build NER base (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-latest
            platform: linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ner-base
          push: true
          tags: ${{ env.BASE_IMAGE }}:${{ inputs.version }}-${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          build-args: |
            NER_MODEL=${{ inputs.ner_model }}
          cache-from: type=gha,scope=ner-base-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ner-base-${{ matrix.arch }}

  merge-manifest:
    name: Create multi-arch manifest
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t "${{ env.BASE_IMAGE }}:${{ inputs.version }}" \
            "${{ env.BASE_IMAGE }}:${{ inputs.version }}-amd64" \
            "${{ env.BASE_IMAGE }}:${{ inputs.version }}-arm64"
          echo "Pushed multi-arch manifest: ${{ env.BASE_IMAGE }}:${{ inputs.version }}"
