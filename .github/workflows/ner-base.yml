name: NER Base Image

on:
  # Manual trigger for version bumps
  workflow_dispatch:
    inputs:
      version:
        description: 'Base image version tag (e.g. v1, v2)'
        required: true
        default: 'v1'
      ner_model:
        description: 'HuggingFace NER model name'
        required: true
        default: 'dslim/bert-base-NER'
  # Auto-trigger when NER artifacts change on main
  push:
    branches: [main]
    paths:
      - 'Dockerfile.ner-base'
      - 'scripts/export_ner_model.py'

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/${{ github.repository }}-ner-base

jobs:
  build-base:
    name: Build NER base (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-latest
            platform: linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "ner_model=${{ inputs.ner_model }}" >> "$GITHUB_OUTPUT"
          else
            # Auto-trigger on push: use v1 as default version
            echo "tag=v1" >> "$GITHUB_OUTPUT"
            echo "ner_model=dslim/bert-base-NER" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ner-base
          push: true
          tags: ${{ env.BASE_IMAGE }}:${{ steps.version.outputs.tag }}-${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          build-args: |
            NER_MODEL=${{ steps.version.outputs.ner_model }}
          cache-from: type=gha,scope=ner-base-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ner-base-${{ matrix.arch }}

  merge-manifest:
    name: Create multi-arch manifest
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v1" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker manifest create "${{ env.BASE_IMAGE }}:${TAG}" \
            "${{ env.BASE_IMAGE }}:${TAG}-amd64" \
            "${{ env.BASE_IMAGE }}:${TAG}-arm64"
          docker manifest annotate "${{ env.BASE_IMAGE }}:${TAG}" \
            "${{ env.BASE_IMAGE }}:${TAG}-amd64" --os linux --arch amd64
          docker manifest annotate "${{ env.BASE_IMAGE }}:${TAG}" \
            "${{ env.BASE_IMAGE }}:${TAG}-arm64" --os linux --arch arm64
          docker manifest push "${{ env.BASE_IMAGE }}:${TAG}"
          echo "Pushed multi-arch manifest: ${{ env.BASE_IMAGE }}:${TAG}"
