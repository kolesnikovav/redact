name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: redact
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: redact
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: redact
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: redact
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: redact.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI binary
        run: cargo build --release --package redact-cli --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Create archive
        id: create_archive
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../redact-${{ matrix.target }}.zip ${{ matrix.binary_name }}
            echo "archive_name=redact-${{ matrix.target }}.zip" >> $GITHUB_OUTPUT
          else
            tar czf ../../../redact-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}
            echo "archive_name=redact-${{ matrix.target }}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: ${{ steps.create_archive.outputs.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ needs.create-release.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION, Tag=$TAG_VERSION"
            exit 1
          fi

      - name: Publish redact-core
        run: |
          cd crates/redact-core
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Package may already be published"

      - name: Wait for redact-core to be available
        run: sleep 30

      - name: Publish redact-ner
        run: |
          cd crates/redact-ner
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Package may already be published"

      - name: Wait for redact-ner to be available
        run: sleep 30

      - name: Publish redact-api
        run: |
          cd crates/redact-api
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Package may already be published"

      - name: Publish redact-cli
        run: |
          cd crates/redact-cli
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Package may already be published"

      - name: Publish redact-wasm
        run: |
          cd crates/redact-wasm
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Package may already be published"

  docker:
    name: Build and Push Docker Image
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
